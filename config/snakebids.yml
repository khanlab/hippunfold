pybids_inputs:
  T2w:
    filters:
      suffix: T2w
      extension: .nii.gz
      datatype: anat
      invalid_filters: allow
    wildcards:
    - subject
    - session
    - acquisition
    - run
  hippb500:
    filters:
      suffix: b500
      extension: .nii.gz
      invalid_filters: allow
      datatype: dwi
    wildcards:
    - subject
    - session
  T1w:
    filters:
      suffix: T1w
      extension: .nii.gz
      datatype: anat
      invalid_filters: allow
    wildcards:
    - subject
    - session
    - acquisition
    - run
  seg:
    filters:
      suffix: dseg
      extension: .nii.gz
      datatype: anat
      invalid_filters: allow
    wildcards:
    - subject
    - session
  cropseg:
    filters:
      suffix: dseg
      extension: .nii.gz
      datatype: anat
      invalid_filters: allow
    wildcards:
    - subject
    - session
    - hemi
parse_args:
  bids_dir:
    help: The directory with the input dataset formatted according to the BIDS 
      standard.
  output_dir:
    help: The directory where the output files should be stored. If you are 
      running group level analysis this folder should be prepopulated with the 
      results of the participant level analysis.
  analysis_level:
    help: Level of the analysis that will be performed.
    choices: *id001
  --participant_label:
    help: The label(s) of the participant(s) that should be analyzed. The label 
      corresponds to sub-<participant_label> from the BIDS spec (so it does not 
      include "sub-"). If this parameter is not provided all subjects should be 
      analyzed. Multiple participants can be specified with a space separated 
      list.
    nargs: +
  --exclude_participant_label:
    help: The label(s) of the participant(s) that should be excluded. The label 
      corresponds to sub-<participant_label> from the BIDS spec (so it does not 
      include "sub-"). If this parameter is not provided all subjects should be 
      analyzed. Multiple participants can be specified with a space separated 
      list.
    nargs: +
  --version:
    help: Print the version of HippUnfold
    action: version
    version: 1.5.2-pre.2
  --modality:
    help: 'Type of image to run hippunfold on. Modality prefixed with seg will import
      an existing (manual) hippocampal tissue segmentation from that space, instead
      of running neural network (default: %(default)s)'
    required: true
    choices:
    - T1w
    - T2w
    - hippb500
    - segT1w
    - segT2w
    - cropseg
  --template:
    choices:
    - CITI168
    - dHCP
    - MBMv2
    - MBMv3
    - CIVM
    - ABAv3
    - bigbrain
    default: CITI168
    help: 'Set the template to use for registration to coronal oblique (and optionally
      for template-based segmentation if --use-template-seg is enabled). CITI168 is
      for adult human data, dHCP is for neonatal human data, MBMv2 is for ex vivo
      marmoset data, MBMv3 is for in vivo marmoset data, CIVM is for in vivo macaque
      data, and ABAv3 is for mouse data. When using a non-human template, consider
      using a corresponding atlas. (default: %(default)s)'
  --inject_template:
    choices:
    - upenn
    - dHCP
    - MBMv2
    - MBMv3
    - CIVM
    - ABAv3
    - bigbrain
    default: upenn
    help: 'Set the template to use for shape injection. (default: %(default)s)'
  --use_template_seg:
    help: 'Use template-based segmentation for hippocampal tissue *instead of* nnUnet
      and shape injection. This is only to be used if nnUnet models are not trained
      for the data you are using, e.g. for non-human primate data with the MBMv2 (ex
      vivo marmoset), MBMv3 (in vivo marmoset), or CIVM (ex vivo macaque) template.
      (default: %(default)s)'
    default: false
    action: store_true
  --template_seg_smoothing_factor:
    help: 'Scales the default smoothing sigma for gradient and warp in greedy registration
      for template-based segmentation. Using a value higher than 1 will use result
      in a smoother warp. (default: %(default)s)'
    default: 2.0
  --derivatives:
    help: 'Path to the derivatives folder (e.g. for finding manual segs) (default:
      %(default)s) '
    default: false
  --skip_preproc:
    help: 'Set this flag if your inputs (e.g. T2w, dwi) are already pre-processed
      (default: %(default)s)'
    default: false
    action: store_true
  --skip_coreg:
    help: 'Set this flag if your inputs (e.g. T2w, dwi) are already registered to
      T1w space (default: %(default)s)'
    default: false
    action: store_true
  --skip_inject_template_labels:
    help: 'Set this flag to skip post-processing template injection into CNN segmentation.
      Note this will disable generation of DG surfaces. (default: %(default)s)'
    default: false
    action: store_true
  --inject_template_smoothing_factor:
    help: 'Scales the default smoothing sigma for gradient and warp in template shape
      injection. Using a value higher than 1 will use result in a smoother warp, and
      greater capacity to patch larger holes in segmentations. Try setting to 2 if
      nnunet segmentations have large holes. Note: the better solution is to re-train
      network on the data you are using (default: %(default)s)'
    default: 1.0
  --rigid_reg_template:
    help: 'Use rigid instead of affine for registration to template. Try this if your
      images are reduced FOV (default: %(default)s)'
    default: false
    action: store_true
  --no_reg_template:
    help: 'Use if input data is already in space-CITI168 (default: %(default)s)'
    default: false
    action: store_true
  --t1_reg_template:
    help: 'Use T1w to register to template space, instead of the segmentation modality.
      Note: this was the default behavior prior to v1.0.0.  (default: %(default)s)'
    default: false
    action: store_true
  --crop_native_res:
    help: 'Sets the bounding box resolution for the crop native (e.g. cropT1w space).
      Under the hood, hippUnfold operates at higher resolution than the native image,
      so this tries to preserve some of that detail. (default: %(default)s)'
    default: 0.2x0.2x0.2mm
  --crop_native_box:
    help: 'Sets the bounding box size for the crop native (e.g. cropT1w space). Make
      this larger if your hippocampi in crop{T1w,T2w} space are getting cut-off. This
      must be in voxels (vox) not millimeters (mm). (default: %(default)s)'
    default: 256x256x256vox
  --atlas:
    choices:
    - bigbrain
    - magdeburg
    - freesurfer
    - multihist7
    - macaque
    - mouse
    default:
    - multihist7
    nargs: +
    help: 'Select the atlas (unfolded space) to use for subfield labels. (default:
      %(default)s)'
  --no_unfolded_reg:
    help: 'Do not perform unfolded space (2D) registration based on thickness, curvature,
      and gyrification for closer alignment to the reference atlas. NOTE: only multihist7
      has these features currently, so this unfolded_reg is automatically skipped
      if a different atlas is chosen. (default: %(default)s)'
    default: false
    action: store_true
  --generate_myelin_map:
    help: 'Generate myelin map using T1w divided by T2w, and map to surface with ribbon
      approach. Requires both T1w and T2w images to be present. (default: %(default)s)'
    default: false
    action: store_true
  --use_gpu:
    help: 'Enable gpu for inference by setting resource gpus=1 in run_inference rule
      (default: %(default)s)'
    default: false
    action: store_true
  --nnunet_enable_tta:
    help: 'Enable test-time augmentation for nnU-net inference, slows down inference
      by 8x, but potentially increases accuracy (default: %(default)s)'
    default: false
    action: store_true
  --output_spaces:
    choices:
    - native
    - T1w
    nargs: +
    default:
    - native
    help: 'Sets output spaces for results (default: %(default)s)'
  --output_density:
    choices:
    - 0p5mm
    - 1mm
    - 2mm
    - unfoldiso
    default:
    - 0p5mm
    nargs: +
    help: 'Sets the output vertex density for results. Options correspond to approximate
      vertex spacings of 0.5mm, 1.0mm, and 2.0mm, respectively, with the unfoldiso
      (32k hipp) vertices legacy option having unequal vertex spacing. (default: %(default)s)'
  --hemi:
    choices:
    - L
    - R
    default:
    - L
    - R
    nargs: +
    help: 'Hemisphere(s) to process (default: %(default)s)'
  --laminar_coords_method:
    choices:
    - laplace
    - equivolume
    default:
    - equivolume
    help: 'Method to use for laminar coordinates. Equivolume uses equivolumetric layering
      from Waehnert et al 2014 (Nighres implementation). (default: %(default)s)'
  --autotop_labels:
    choices:
    - hipp
    - dentate
    default:
    - hipp
    - dentate
    nargs: +
    help: 'Run hipp (CA + subiculum) alone or include dentate (default: %(default)s)'
  --keep_work:
    help: 'Keep work folder intact instead of archiving it for each subject (default:
      %(default)s)'
    default: false
    action: store_true
  --force_nnunet_model:
    help: 'Force nnunet model to use (expert option). (default: %(default)s)'
    default: false
    choices:
    - T1w
    - T2w
    - T1T2w
    - b1000
    - trimodal
    - hippb500
    - neonateT1w_Finetune
    - synthseg_v0.1
    - synthseg_v0.2
    - neonateT1w
    - ADNI_T1w_v1
    - neonateT2w_v2
    - neonateT1w_v2
    - neonateT1wT2w_v2
    - neonate_synthseg
