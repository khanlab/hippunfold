#list of analysis levels in the bids app
analysis_levels:
  - participant
  - group_create_atlas
  - group

#mapping from analysis_level to set of target rules or files
targets_by_analysis_level:
  participant:
    - "all" # if '', then the first rule is run
  group_create_atlas:
    - "all_create_atlas"
  group:
    - "all_group_tsv"

#this configures the pybids grabber - create an entry for each type of input you want to grab
# indexed by name of input
#   dictionary for each input is passed directly to pybids get()
#    https://bids-standard.github.io/pybids/generated/bids.layout.BIDSLayout.html#bids.layout.BIDSLayout.get

pybids_inputs:
  T2w:
    filters:
      suffix: "T2w"
      extension: ".nii.gz"
      datatype: "anat"
    wildcards:
      - subject
      - session
      - acquisition
      - run

  hippb500:
    filters:
      suffix: "b500"
      extension: ".nii.gz"
      datatype: "dwi"
    wildcards:
      - subject
      - session

  T1w:
    filters:
      suffix: "T1w"
      extension: ".nii.gz"
      datatype: "anat"
    wildcards:
      - subject
      - session
      - acquisition
      - run

  dsegtissue:
    filters:
      suffix: "dseg"
      extension: ".nii.gz"
      datatype: "anat"
      desc: "tissue"
    wildcards:
      - subject
      - session
      - hemi
      - acquisition
      - run

  dsegsubfields:
    filters:
      suffix: "dseg"
      extension: ".nii.gz"
      datatype: "anat"
      desc: "subfields"
    wildcards:
      - subject
      - session
      - hemi
      - acquisition
      - run

#configuration for the command-line parameters to make available
# passed on the argparse add_argument()
parse_args:
  --modality:
    help: "Type of image to run hippunfold on. For dsegtissue and be sure to match the label scheme applied in the look up table (lut) online. For best performance, please also make sure the input is approximately aligned to the template space, with separate hemi-L|R in the name(s). (default: %(default)s)"
    required: True
    choices:
      - T1w
      - T2w
      - hippb500
      - dsegtissue

  --template:
    choices:
      - "CITI168"
      - "dHCP"
      - "MBMv3"
      - "CIVM"
      - "ABAv3"
      - "fetalGA21"
      - "fetalGA22"
      - "fetalGA23"
      - "fetalGA24"
      - "fetalGA25"
      - "fetalGA26"
      - "fetalGA27"
      - "fetalGA28"
      - "fetalGA29"
      - "fetalGA30"
      - "fetalGA31"
      - "fetalGA32"
      - "fetalGA33"
      - "fetalGA34"
      - "fetalGA35"
      - "fetalGA36"
    default: "CITI168"
    help: "Set the template to use for registration to coronal oblique (and optionally for template-based segmentation if --use-template-seg is enabled). CITI168 is for adult human data, dHCP is for neonatal human data, MBMv3 is for marmoset data, CIVM is for in vivo macaque data, and ABAv3 is for mouse data. When using a non-human template, consider using a corresponding atlas. (default: %(default)s)"

  --inject_template:
    choices:
      - "upenn"
      - "dHCP"
      - "MBMv3"
      - "CIVM"
      - "ABAv3"
    default: "upenn"
    help: "Set the template to use for shape injection. (default: %(default)s)"

  --use_template_seg:
    help: "Use template-based segmentation for hippocampal tissue *instead of* nnUnet and shape injection. This is only to be used if nnUnet models are not trained for the data you are using, e.g. for non-human primate data with the MBMv3 (marmoset) or CIVM (macaque) template. (default: %(default)s)"
    default: False
    action: "store_true"

  --template_seg_smoothing_factor:
    help: "Scales the default smoothing sigma for gradient and warp in greedy registration for template-based segmentation. Using a value higher than 1 will use result in a smoother warp. (default: %(default)s)"
    default: 2.0

  --skip_preproc:
    help: "Set this flag if your inputs (e.g. T2w, dwi) are already pre-processed (default: %(default)s)"
    default: False
    action: "store_true"

  --skip_coreg:
    help: "Set this flag if your inputs (e.g. T2w, dwi) are already registered to T1w space (default: %(default)s)"
    default: False
    action: "store_true"

  --skip_inject_template_labels:
    help: "Set this flag to skip post-processing template injection into CNN segmentation. Note this will disable generation of DG surfaces. (default: %(default)s)"
    default: False
    action: "store_true"

  --inject_template_smoothing_factor:
    help: "Scales the default smoothing sigma for gradient and warp in template shape injection. Using a value higher than 1 will use result in a smoother warp, and greater capacity to patch larger holes in segmentations. Try setting to 2 if nnunet segmentations have large holes. Note: the better solution is to re-train network on the data you are using (default: %(default)s)"
    default: 1.0

  --rigid_reg_template:
    help: "Use rigid instead of affine for registration to template. Try this if your images are reduced FOV (default: %(default)s)"
    default: False
    action: "store_true"

  --no_reg_template:
    help: "Use if input data is already in space-CITI168 (default: %(default)s)"
    default: False
    action: "store_true"

  --t1_reg_template:
    help: "Use T1w to register to template space, instead of the segmentation modality. Note: this was the default behavior prior to v1.0.0.  (default: %(default)s)"
    default: false
    action: store_true

  --crop_res:
    help: "Sets the bounding box resolution for the crop original modality (e.g. cropT1w space). Under the hood, hippUnfold operates at higher resolution than the original image, so this tries to preserve some of that detail. (default: %(default)s)"
    default: "0.2x0.2x0.2mm"

  --crop_box:
    help: "Sets the bounding box size for the crop original modality (e.g. cropT1w space). Make this larger if your hippocampi in crop{T1w,T2w} space are getting cut-off. This must be in voxels (vox) not millimeters (mm). (default: %(default)s)"
    default: "256x256x256vox"

  --resample_dsegtissue:
    help: 'Resample the manual segmentation (for --modality dsegtissue), keeping the bounding box the same, but changing the number of voxels in the image. This can be specified as voxels ("300x300x300"), or a percentage ("20%%") or percentage in each direction ("20x20x40%%"). Note: the segmentation will always be subsequently cropped around the segmentation, with a padding of 5 voxels.  (default: %(default)s)'
    default: null

  --laminar_coords_res_hipp:
    help: "Set the resolution that the laminar (IO) coords will be computed with for hippocampus. This is implemented by resampling the segmentation to this resolution prior to generating the coords. (default: %(default)s)"
    default: "0.3x0.3x0.3mm"

  --laminar_coords_res_dentate:
    help: "Set the resolution that the laminar (IO) coords will be computed with for the dentate gyrus. This is implemented by resampling the segmentation to this resolution prior to generating the coords. (default: %(default)s)"
    default: "0.1x0.1x0.1mm"

  --no_unfolded_reg:
    help: "Do not perform unfolded space (2D) registration based on surface metrics (e.g. thickness, curvature, and gyrification) for closer alignment to the reference atlas. (default: %(default)s)"
    default: False
    action: store_true

  --generate_myelin_map:
    help: "Generate myelin map using T1w divided by T2w, and map to surface with ribbon approach. Requires both T1w and T2w images to be present. (default: %(default)s)"
    default: False
    action: store_true

  --use_gpu:
    help: "Enable gpu for inference by setting resource gpus=1 in run_inference rule (default: %(default)s)"
    default: False
    action: "store_true"

  --nnunet_enable_tta:
    help: "Enable test-time augmentation for nnU-net inference, slows down inference by 8x, but potentially increases accuracy (default: %(default)s)"
    default: False
    action: "store_true"

  --output_spaces:
    choices:
      - "T1w"
      - "corobl"
    nargs: "+"
    default: []
    help: "Sets output spaces for results (default: %(default)s)"

  --hemi:
    choices:
      - "L"
      - "R"
    default:
      - "L"
      - "R"
    nargs: "+"
    help: "Hemisphere(s) to process (default: %(default)s)"

  --laminar_coords_method:
    choices:
      - "laplace"
      - "equivol"
      - "equidist"
    default: "equidist"
    help: "Method to use for laminar coordinates. Equivol and equidist are from the laynii LN2_LAYERS tool.  (default: %(default)s)"

  --autotop_labels:
    choices:
      - "hipp"
      - "dentate"
    default:
      - "hipp"
      - "dentate"
    nargs: "+"
    help: "Run hipp (CA + subiculum) alone or include dentate (default: %(default)s)"

  --force_nnunet_model:
    help: "Force nnunet model to use (expert option). (default: %(default)s)"
    default: False
    choices:
      - T1w
      - T2w
      - T1T2w
      - b1000
      - trimodal
      - hippb500
      - neonateT1w_v1
      - neonateT1w
      - synthseg_v0.1
      - synthseg_v0.2
      - neonateT1w_v2
      - neonateT2w_v2
      - neonateT12w_v2
      - neonateT1w_v2_stdSplit
      - ADNI_T1w_v1
      - neonate_synthseg
      - hippneo_synthseg
      - hippneo_synthtopo
      - hippls_synthseg
      - hippls_synthtopo

  --enable-bids-validation:
    help: |
      Enable validation of BIDS dataset. BIDS validation would be performed
      using the bids-validator plugin (if installed/enabled) or with the pybids
      validator implementation (if bids-validator is not installed/enabled).
    dest: "plugins.validator.skip"
    action: "store_false"
    default: True

  --version:
    help: "Print the version of HippUnfold"
    action: version
    version: "2.0.0"

# --- surface specific configuration --

autotop_labels:
  - "hipp"
  - "dentate"

surf_types:
  hipp:
    - midthickness
    - inner
    - outer
  dentate:
    - midthickness
    - inner
    - outer

gifti_metric_types:
  hipp:
    - gyrification.shape
    - curvature.shape
    - thickness.shape
  dentate:
    - gyrification.shape
    - curvature.shape
    - thickness.shape

cifti_metric_types:
  hipp:
    - gyrification.dscalar
    - curvature.dscalar
    - thickness.dscalar
  dentate:
    - gyrification.dscalar
    - curvature.dscalar
    - thickness.dscalar

#--- workflow specific configuration --

xfm_identity: resources/etc/identity_xfm.txt
xfm_identity_itk: resources/etc/identity_xfm_itk.txt

template_files:
  CITI168:
    T1w: T1w_head_700um.nii.gz
    T2w: T2w_head_700um.nii.gz
    xfm_corobl: CoronalOblique_rigid.txt
    crop_ref: T2w_300umCoronalOblique_hemi-{hemi}.nii.gz
    crop_refT1w: T1w_300umCoronalOblique_hemi-{hemi}.nii.gz
    Mask_crop: Mask_300umCoronalOblique_hemi-{hemi}.nii.gz
    dseg: sub-CITI168_hemi-{hemi}_space-cropT1w_desc-postproc_dseg.nii.gz
    coords: sub-CITI168_dir-{dir}_hemi-{hemi}_space-cropT1w_label-{label}_desc-laplace_coords.nii.gz
    hemi_wildcards:
      - L
      - R
  dHCP:
